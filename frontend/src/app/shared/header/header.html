<header class="navbar">
  <div class="navbar-container">
    <a routerLink="/home" class="navbar-logo">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()">
      <div class="hamburger" [class.open]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <nav class="navbar-menu" [class.active]="isMenuOpen">
      <ul class="nav-links">
        <li><a routerLink="/home" routerLinkActive="active" (click)="isMenuOpen = false">Home</a></li>

        <ng-container *ngIf="authService.CurentUser | async as user; else guestLinks">
          <li><a routerLink="/cart" routerLinkActive="active" (click)="isMenuOpen = false">Cart</a></li>
          <li *ngIf="user.role === 'admin'"><a routerLink="/admin/dashboard" routerLinkActive="active" (click)="isMenuOpen = false">Dashboard</a></li>
          
          <li class="user-action user-profile">
            <a routerLink="/profile" routerLinkActive="active" (click)="isMenuOpen = false" class="profile-link">
              <span class="avatar">{{ user.name?.charAt(0) | uppercase }}</span>
              <span class="username">{{ user.name }}</span>
            </a>
          </li>
          <li class="user-action">
            <button class="btn btn-logout" (click)="logout()">Logout</button>
          </li>
        </ng-container>

        <ng-template #guestLinks>
          <li class="user-action"><a routerLink="/login" routerLinkActive="active" (click)="isMenuOpen = false" class="nav-link btn-ghost">Log in</a></li>
          <li class="user-action"><a routerLink="/register" routerLinkActive="active" (click)="isMenuOpen = false" class="nav-link btn-primary">Sign up</a></li>
        </ng-template>
      </ul>
    </nav>
  </div>
</header>
