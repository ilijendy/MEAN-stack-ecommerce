<header class="navbar">
  <div class="navbar-container">
    <a routerLink="/home" class="navbar-logo">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="logo-text">Elevate</span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()">
      <div class="hamburger" [class.open]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <nav class="navbar-menu" [class.active]="isMenuOpen">
      <ul class="nav-links">
        <li><a routerLink="/home" routerLinkActive="active" (click)="isMenuOpen = false">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="isMenuOpen = false">About Us</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="isMenuOpen = false">Contact</a></li>

        <ng-container *ngIf="authService.CurentUser | async as user; else guestLinks">
          <!-- Cart Icon -->
          <li>
            <a routerLink="/cart" routerLinkActive="active" (click)="isMenuOpen = false" class="icon-link cart-link" title="Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
            </a>
          </li>

          <!-- Admin Dashboard -->
          <li *ngIf="user.role === 'admin'"><a routerLink="/admin/dashboard" routerLinkActive="active" (click)="isMenuOpen = false">Dashboard</a></li>

          <!-- User Dropdown -->
          <li class="user-dropdown">
            <button class="avatar-btn" (click)="toggleDropdown()">
              <span class="avatar">{{ user.name?.charAt(0) | uppercase }}</span>
              <svg class="chevron" [class.open]="dropdownOpen" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="dropdown-menu" *ngIf="dropdownOpen">
              <div class="dropdown-header">
                <strong>{{ user.name }}</strong>
                <span>{{ user.email }}</span>
              </div>
              <div class="dropdown-divider"></div>
              <a routerLink="/profile" class="dropdown-item" (click)="dropdownOpen = false; isMenuOpen = false">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
              </a>
              <a routerLink="/orders" class="dropdown-item" (click)="dropdownOpen = false; isMenuOpen = false">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                My Orders
              </a>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item signout" (click)="logout()">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
              </button>
            </div>
          </li>
        </ng-container>

        <ng-template #guestLinks>
          <li class="user-action"><a routerLink="/login" routerLinkActive="active" (click)="isMenuOpen = false" class="nav-link btn-ghost">Log in</a></li>
          <li class="user-action"><a routerLink="/register" routerLinkActive="active" (click)="isMenuOpen = false" class="nav-link btn-primary">Sign up</a></li>
        </ng-template>
      </ul>
    </nav>
  </div>
</header>
