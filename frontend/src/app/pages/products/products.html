<div class="products-container">

  <header class="page-header">
    <h1>Our Products</h1>
  </header>

  <section class="controls-section">
    <input type="text" placeholder="Search products..." class="search-input" [(ngModel)]="searchQuery" (input)="searchProducts()">
    <select class="category-select" [(ngModel)]="selectedCategory" (change)="filterByCategory()">
      @for(cat of categoreies; track cat.value) {
        <option [value]="cat.value">{{ cat.label }}</option>
      }
    </select>
  </section>

  @if(loading) {
  <div class="loading-spinner">
    <p>Loading products...</p>
  </div>
  }

  <section class="products-grid">
    @for(product of filterProducts; track product._id) {
    <div class="product-card">
      <div class="card-image">
        <img [src]="product.image ? product.image : 'https://placehold.co/400x300/f5f5f5/999?text=' + product.name" [alt]="product.name">
      </div>
      <div class="card-body">
        <span class="category-badge">{{ product.category }}</span>
        <h3 class="product-title">{{ product.name }}</h3>
        <p class="product-price">${{ product.price }}</p>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary">Add to Cart</button>
        <button class="btn btn-danger">Delete</button>
      </div>
    </div>
    } @empty {
      <p style="grid-column: 1 / -1; text-align: center; color: #999; padding: 40px 0;">No products found.</p>
    }
  </section>

</div>
